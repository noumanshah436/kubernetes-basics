apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: fastnext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery
          image: backend:local
          command: ["celery", "-A", "app.worker.celery_app.celery", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: app-config